<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global History Timeline | 1900–Present</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- Globe Panel -->
  <div id="globe-panel">
    <canvas id="globe-canvas"></canvas>
    <div id="globe-info">
      <div id="globe-location"></div>
    </div>
  </div>

  <!-- Top Bar -->
  <header id="top-bar">
    <div id="logo">
      <h1>GLOBAL HISTORY</h1>
      <span class="subtitle">1900 — Present</span>
    </div>
    <div id="controls">
      <div id="category-filters"></div>
      <button id="conflict-back" class="mode-btn hidden" title="Return to full timeline">
        <span class="mode-icon">◀</span> <span id="conflict-back-label">Full Timeline</span>
      </button>
      <div id="nav-buttons">
        <button id="prev-btn" title="Previous Event">‹</button>
        <button id="next-btn" title="Next Event">›</button>
      </div>
      <div id="zoom-controls">
        <button id="zoom-in" title="Zoom In">+</button>
        <button id="zoom-out" title="Zoom Out">−</button>
        <span id="zoom-level">100%</span>
      </div>
    </div>
  </header>

  <!-- Decade markers -->
  <div id="decade-bar"></div>

  <!-- Timeline -->
  <div id="timeline-container">
    <div id="timeline-track">
      <svg id="connections-svg"></svg>
      <div id="timeline-line"></div>
      <div id="events-container"></div>
    </div>
  </div>

  <!-- Progress Scrubber -->
  <div id="progress-bar">
    <div id="progress-track">
      <div id="progress-decades"></div>
      <div id="progress-viewport"></div>
      <div id="progress-handle"></div>
    </div>
    <div id="progress-year-label"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
